<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="xterm.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1020;
      border-radius: 24px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }
    #terminal-shell {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 14px;
      overflow: hidden;
      border-radius: 24px;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(168,85,247,0.14), transparent 24%),
        linear-gradient(180deg, #111827 0%, #0b1020 100%);
    }
    #terminal {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      background: rgba(2, 6, 23, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.15);
    }
    #terminal-mount {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .xterm {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }
    .xterm-viewport {
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div id="terminal-shell">
    <div id="terminal">
      <div id="terminal-mount"></div>
    </div>
  </div>
  <script src="xterm.js"></script>
  <script>
    const terminalRoot = document.getElementById('terminal');
    const terminalMount = document.getElementById('terminal-mount');
    let term = null;
    const terminalDisposables = [];

    let lastSentSize = null;
    let layoutRetryHandle = null;
    let layoutPassBudgetRemaining = 0;
    let didPostTerminalReady = false;
    let forceResizePassesPending = 0;
    let deferredResizeObserver = null;
    let deferredMeasureHandle = null;
    let deferredMeasureBudgetRemaining = 0;
    let metricSettleHandle = null;
    let metricSettleBudgetRemaining = 0;

    function post(message) {
      window.webkit?.messageHandlers?.idata?.postMessage(message);
    }

    function debug(message) {
      post({ type: 'debug', message });
    }

    function makeTerminalOptions() {
      return {
        cursorBlink: true,
        allowTransparency: false,
        macOptionIsMeta: true,
        rightClickSelectsWord: true,
        // Keep VisiData's box-drawing borders on the font path to avoid
        // canvas glyph seams at category boundaries and other redraw edges.
        customGlyphs: false,
        scrollback: 0,
        scrollbar: {
          showScrollbar: false
        },
        fontFamily: 'SF Mono, Menlo, Monaco, Consolas, monospace',
        fontSize: 13,
        lineHeight: 1,
        theme: {
          background: '#020617',
          foreground: '#E2E8F0',
          cursor: '#F8FAFC',
          cursorAccent: '#020617',
          selectionBackground: 'rgba(96, 165, 250, 0.32)',
          black: '#0f172a',
          red: '#ef4444',
          green: '#22c55e',
          yellow: '#eab308',
          blue: '#3b82f6',
          magenta: '#a855f7',
          cyan: '#06b6d4',
          white: '#e2e8f0',
          brightBlack: '#475569',
          brightRed: '#f87171',
          brightGreen: '#4ade80',
          brightYellow: '#facc15',
          brightBlue: '#60a5fa',
          brightMagenta: '#c084fc',
          brightCyan: '#22d3ee',
          brightWhite: '#f8fafc'
        }
      };
    }

    function disposeTerminalDisposables() {
      while (terminalDisposables.length > 0) {
        terminalDisposables.pop()?.dispose?.();
      }
    }

    function stopMetricSettlingChecks() {
      if (metricSettleHandle !== null) {
        clearTimeout(metricSettleHandle);
        metricSettleHandle = null;
      }
      metricSettleBudgetRemaining = 0;
    }

    function scheduleMetricSettlingChecks() {
      metricSettleBudgetRemaining = Math.max(metricSettleBudgetRemaining, 8);

      if (metricSettleHandle !== null) {
        return;
      }

      const settle = () => {
        metricSettleHandle = null;

        if (metricSettleBudgetRemaining > 0) {
          metricSettleBudgetRemaining -= 1;
        }

        if (!term) {
          stopMetricSettlingChecks();
          return;
        }

        refreshTerminalLayout(false);

        if (metricSettleBudgetRemaining > 0) {
          metricSettleHandle = setTimeout(settle, 250);
          return;
        }

        stopMetricSettlingChecks();
      };

      metricSettleHandle = setTimeout(settle, 250);
    }

    function stopDeferredLayoutRecovery() {
      deferredResizeObserver?.disconnect();
      deferredResizeObserver = null;
      if (deferredMeasureHandle !== null) {
        clearTimeout(deferredMeasureHandle);
        deferredMeasureHandle = null;
      }
      deferredMeasureBudgetRemaining = 0;
    }

    function armDeferredLayoutRecovery() {
      if (deferredResizeObserver === null && typeof ResizeObserver !== 'undefined') {
        deferredResizeObserver = new ResizeObserver(() => {
          if (!term || !refreshTerminalLayout(forceResizePassesPending > 0)) {
            return;
          }

          stopDeferredLayoutRecovery();

          if (term.cols > 0 && term.rows > 0) {
            postTerminalReady();
          }

          if (!didPostTerminalReady || forceResizePassesPending > 0) {
            scheduleTerminalLayoutPasses({ forceResize: forceResizePassesPending > 0 });
          }
        });
        deferredResizeObserver.observe(terminalMount);
      }

      deferredMeasureBudgetRemaining = Math.max(deferredMeasureBudgetRemaining, 8);

      if (deferredMeasureHandle !== null) {
        return;
      }

      const retryDeferredMeasurement = () => {
        deferredMeasureHandle = null;

        if (deferredMeasureBudgetRemaining > 0) {
          deferredMeasureBudgetRemaining -= 1;
        }

        if (!term) {
          stopDeferredLayoutRecovery();
          return;
        }

        if (refreshTerminalLayout(forceResizePassesPending > 0)) {
          stopDeferredLayoutRecovery();

          if (term.cols > 0 && term.rows > 0) {
            postTerminalReady();
          }

          if (!didPostTerminalReady || forceResizePassesPending > 0) {
            scheduleTerminalLayoutPasses({ forceResize: forceResizePassesPending > 0 });
          }
          return;
        }

        if (deferredMeasureBudgetRemaining > 0) {
          deferredMeasureHandle = setTimeout(retryDeferredMeasurement, 250);
          return;
        }

        deferredMeasureHandle = null;
      };

      deferredMeasureHandle = setTimeout(retryDeferredMeasurement, 250);
    }

    function createTerminal(resetReadyState = false) {
      stopDeferredLayoutRecovery();
      stopMetricSettlingChecks();
      disposeTerminalDisposables();

      if (term) {
        term.clearSelection();
        term.scrollToTop();
        term.dispose();
        term = null;
      }

      terminalMount.textContent = '';
      term = new Terminal(makeTerminalOptions());
      term.open(terminalMount);
      term.focus();

      terminalDisposables.push(term.onData((data) => {
        post({ type: 'input', data });
      }));
      terminalDisposables.push(term.onBinary((data) => {
        post({ type: 'binary', data: btoa(data) });
      }));

      lastSentSize = null;
      forceResizePassesPending = Math.max(forceResizePassesPending, 1);

      debug(`createTerminal resetReady=${resetReadyState} forceResizePassesPending=${forceResizePassesPending}`);

      if (resetReadyState) {
        didPostTerminalReady = false;
      }
    }

    function writeBase64(base64Value) {
      if (!term) {
        return;
      }

      const binary = atob(base64Value);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      term.write(bytes);

      // Output streaming should not constantly trigger layout retries.
      // We only retry sizing if we do not yet have a stable terminal size.
      if (!lastSentSize) {
        scheduleTerminalLayoutPasses();
      }
    }

    function renderDimensions() {
      if (!term) {
        return null;
      }

      return term?.dimensions || term?._core?._renderService?.dimensions;
    }

    function scrollbarWidth() {
      if (!term) {
        return 0;
      }

      const showScrollbar = term.options?.scrollbar?.showScrollbar ?? true;
      if (term.options?.scrollback === 0 || !showScrollbar) {
        return 0;
      }
      return term.options?.scrollbar?.width ?? 14;
    }

    function measureAndResize(force = false) {
      if (!term) {
        return false;
      }

      const dimensions = renderDimensions();
      const cellWidth = dimensions?.css?.cell?.width;
      const cellHeight = dimensions?.css?.cell?.height;
      if (!cellWidth || !cellHeight) {
        return false;
      }

      const xtermElement = term.element;
      const parentElement = xtermElement?.parentElement || terminalMount;
      if (!parentElement) {
        return false;
      }

      const parentRect = parentElement.getBoundingClientRect();
      if (!parentRect.width || !parentRect.height) {
        return false;
      }

      const elementStyle = window.getComputedStyle(xtermElement || parentElement);
      const horizontalPadding =
        parseFloat(elementStyle.paddingLeft || '0') +
        parseFloat(elementStyle.paddingRight || '0');
      const verticalPadding =
        parseFloat(elementStyle.paddingTop || '0') +
        parseFloat(elementStyle.paddingBottom || '0');

      const usableWidth = Math.max(0, parentRect.width - horizontalPadding - scrollbarWidth());
      const usableHeight = Math.max(0, parentRect.height - verticalPadding);

      const cols = Math.max(20, Math.floor(usableWidth / cellWidth));
      const rows = Math.max(8, Math.floor(usableHeight / cellHeight));
      const sizeKey = `${cols}x${rows}`;

      const sizeChanged = sizeKey !== lastSentSize;
      const terminalNeedsResize = term.cols !== cols || term.rows !== rows;

      if (!force && !sizeChanged && !terminalNeedsResize) {
        return true;
      }

      lastSentSize = sizeKey;

      debug(
        `measure force=${force} cell=${cellWidth}x${cellHeight} rect=${parentRect.width}x${parentRect.height} usable=${usableWidth}x${usableHeight} term=${term.cols}x${term.rows} next=${cols}x${rows} changed=${sizeChanged} termNeedsResize=${terminalNeedsResize}`
      );

      if (terminalNeedsResize) {
        term.resize(cols, rows);
      }

      if (sizeChanged || terminalNeedsResize) {
        post({ type: 'resize', cols, rows });
      }

      return true;
    }

    function refreshTerminalLayout(forceResize = false) {
      if (!term) {
        return false;
      }

      return measureAndResize(forceResize);
    }

    function postTerminalReady() {
      if (didPostTerminalReady) {
        return;
      }
      didPostTerminalReady = true;
      post({ type: 'ready' });
    }

    function scheduleTerminalLayoutPasses(options = {}) {
      if (options.forceResize) {
        forceResizePassesPending = Math.max(forceResizePassesPending, 1);
      }

      layoutPassBudgetRemaining = Math.max(
        layoutPassBudgetRemaining,
        options.forceResize ? 6 : 3
      );

      if (layoutRetryHandle !== null) {
        return;
      }

      const attempt = () => {
        const forceResize = forceResizePassesPending > 0;
        const didMeasure = refreshTerminalLayout(forceResize);
        if (didMeasure && forceResizePassesPending > 0) {
          forceResizePassesPending -= 1;
        }
        if (didMeasure) {
          stopDeferredLayoutRecovery();
          scheduleMetricSettlingChecks();
        }
        if (didMeasure && term.cols > 0 && term.rows > 0) {
          postTerminalReady();
        }

        if (layoutPassBudgetRemaining > 0) {
          layoutPassBudgetRemaining -= 1;
        }

        const needsAnotherAttempt =
          layoutPassBudgetRemaining > 0 &&
          (!didMeasure || !didPostTerminalReady || forceResizePassesPending > 0);

        if (needsAnotherAttempt) {
          layoutRetryHandle = setTimeout(attempt, 120);
          return;
        }

        layoutRetryHandle = null;

        if (!didMeasure) {
          armDeferredLayoutRecovery();
        }
      };

      attempt();
    }

    window.iDataWriteBase64 = writeBase64;
    window.iDataSoftClearTerminal = function() {
      debug('softClearTerminal');
      term?.clearSelection();
      term?.scrollToTop();
      term?.clear();
    };
    window.iDataClearTerminal = function() {
      debug('clearTerminalDisplay');
      createTerminal(true);
      scheduleTerminalLayoutPasses({ forceResize: true });
    };
    window.iDataRefreshLayout = function() {
      debug('refreshLayout');
      lastSentSize = null;
      scheduleTerminalLayoutPasses({ forceResize: true });
    };
    window.iDataFocusTerminal = function() {
      debug('focusTerminal');
      term?.focus();
      scheduleTerminalLayoutPasses({ forceResize: true });
    };

    createTerminal(true);

    const resizeObserver = new ResizeObserver(() => {
      requestAnimationFrame(() => scheduleTerminalLayoutPasses());
    });
    resizeObserver.observe(terminalRoot);

    terminalRoot.addEventListener('focusin', () => {
      scheduleTerminalLayoutPasses({ forceResize: true });
    });
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        scheduleTerminalLayoutPasses({ forceResize: true });
      }
    });
    window.addEventListener('pageshow', () => {
      scheduleTerminalLayoutPasses({ forceResize: true });
    });
    window.addEventListener('focus', () => {
      scheduleTerminalLayoutPasses({ forceResize: true });
    });

    terminalRoot.addEventListener('wheel', () => {
      debug(`wheel term=${term?.cols ?? 0}x${term?.rows ?? 0} last=${lastSentSize ?? 'nil'}`);
    }, { passive: true });

    requestAnimationFrame(() => {
      scheduleTerminalLayoutPasses({ forceResize: true });
    });
  </script>
</body>
</html>
