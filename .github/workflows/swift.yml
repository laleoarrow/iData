# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: SwiftPM build
        run: swift build -v

      - name: SwiftPM tests
        run: swift test -v

      - name: Xcode Debug build
        run: xcodebuild -project iData.xcodeproj -scheme iDataApp -configuration Debug -derivedDataPath .build/xcode-debug build

      - name: Build installable app bundle
        run: ./scripts/build_app.sh
